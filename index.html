<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦋 구름 릴레이</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#B8E4F9;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif}

/* ── 시작 화면 ── */
#startScreen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(180deg,#87CEEB,#D4F1FF 50%,#FFF5FA);
  z-index:10;
}
.logo{font-size:2rem;font-weight:900;color:#3A7BD5;text-align:center;
  line-height:1.4;margin-bottom:6px;
  text-shadow:0 2px 8px rgba(58,123,213,.2)}
.logo-sub{font-size:.95rem;color:#7AAACC;margin-bottom:24px}
.cast-row{font-size:3.5rem;letter-spacing:8px;margin-bottom:6px}
.cast-names{font-size:.85rem;color:#888;letter-spacing:3px;margin-bottom:28px}
.rule-box{
  background:rgba(255,255,255,.8);border-radius:20px;
  padding:18px 24px;width:88%;max-width:320px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);margin-bottom:28px;
  text-align:center;
}
.rule-box p{font-size:.9rem;color:#555;line-height:2}
.start-btn{
  background:linear-gradient(135deg,#6EC6F5,#A78BFA);
  color:#fff;border:none;border-radius:50px;
  padding:18px 60px;font-size:1.25rem;font-weight:900;
  box-shadow:0 6px 24px rgba(110,198,245,.5);cursor:pointer;
  animation:pulse 1.8s ease-in-out infinite;
}
.start-btn:active{transform:scale(.95)}
@keyframes pulse{
  0%,100%{box-shadow:0 6px 24px rgba(110,198,245,.5)}
  50%{box-shadow:0 6px 36px rgba(167,139,250,.7)}
}

/* ── 게임 화면 ── */
#gameScreen{
  position:fixed;inset:0;display:none;
  background:linear-gradient(180deg,#87CEEB,#D4F1FF 50%,#EAF9EA);
}
canvas{position:absolute;inset:0;width:100%;height:100%}

/* HUD */
.hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;z-index:5;
  background:rgba(255,255,255,.15);
}
.hud-score{
  background:rgba(255,255,255,.85);border-radius:20px;
  padding:8px 20px;font-size:1.3rem;font-weight:900;color:#3A7BD5;
}
.hud-timer{
  background:rgba(255,255,255,.85);border-radius:20px;
  padding:8px 20px;font-size:1.3rem;font-weight:900;color:#E07070;
  min-width:72px;text-align:center;
}

/* 캐릭터 바 */
.char-bar{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:rgba(255,255,255,.75);
  display:flex;justify-content:space-around;align-items:center;
  z-index:5;border-top:2px solid rgba(255,255,255,.9);
  backdrop-filter:blur(4px);
}
.cu{display:flex;flex-direction:column;align-items:center;gap:2px}
.ce{font-size:2.4rem;display:inline-block;transition:transform .1s}
.ce.pop{animation:pop .3s ease}
.cl{font-size:.72rem;color:#666;font-weight:700}
@keyframes pop{0%{transform:scale(1) translateY(0)}40%{transform:scale(1.3) translateY(-10px)}100%{transform:scale(1) translateY(0)}}

/* 파티클 */
.pt{
  position:fixed;font-size:1.4rem;font-weight:900;
  pointer-events:none;z-index:20;
  animation:ptUp .75s ease-out forwards;
}
@keyframes ptUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(.5)}}

/* ── 결과 화면 ── */
#resultScreen{
  position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(180deg,#87CEEB,#D4F1FF 50%,#FFF5FA);
  z-index:10;
}
.r-chars{font-size:3rem;letter-spacing:6px;margin-bottom:8px}
.r-title{font-size:1.9rem;font-weight:900;color:#3A7BD5;margin-bottom:6px}
.r-score{
  font-size:4.5rem;font-weight:900;
  background:linear-gradient(135deg,#6EC6F5,#A78BFA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.r-unit{font-size:1rem;color:#888;margin-bottom:16px}
.rank{
  font-size:1.25rem;font-weight:900;padding:8px 28px;
  border-radius:30px;margin-bottom:16px;
}
.rs{background:#FFD700;color:#7A5900}
.ra{background:#C0C0C0;color:#444}
.rb{background:#CD7F32;color:#fff}
.rc{background:#E8E8E8;color:#777}
.r-msg{
  font-size:.95rem;color:#666;text-align:center;line-height:1.8;
  background:rgba(255,255,255,.75);border-radius:16px;
  padding:14px 22px;width:88%;max-width:320px;margin-bottom:28px;
}
.retry-btn{
  background:linear-gradient(135deg,#6EC6F5,#A78BFA);
  color:#fff;border:none;border-radius:50px;
  padding:16px 52px;font-size:1.1rem;font-weight:800;
  box-shadow:0 6px 20px rgba(110,198,245,.4);cursor:pointer;
}
.retry-btn:active{transform:scale(.95)}
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="startScreen">
  <div class="logo">🦋 나비귀·처진귀<br>접힌귀 구름 릴레이</div>
  <div class="logo-sub">오둥이 팀플레이 게임</div>
  <div class="cast-row">🦋🐩🐱</div>
  <div class="cast-names">열무 · 배추 · 까미</div>
  <div class="rule-box">
    <p>
      🌈 무지개 구름 <b>+3점</b><br>
      ☁️ 솜구름 <b>+1점</b><br>
      🌧️ 비구름 <b>–2점</b><br>
      ⏱️ 30초 안에 최고 점수!
    </p>
  </div>
  <button class="start-btn" id="startBtn">🎮 게임 시작!</button>
</div>

<!-- 게임 화면 -->
<div id="gameScreen">
  <canvas id="c"></canvas>
  <div class="hud">
    <div class="hud-score">⭐ <span id="sv">0</span>점</div>
    <div class="hud-timer">⏱ <span id="tv">30</span></div>
  </div>
  <div class="char-bar">
    <div class="cu"><span class="ce" id="cY">🦋</span><span class="cl">열무</span></div>
    <div class="cu"><span class="ce" id="cB">🐩</span><span class="cl">배추</span></div>
    <div class="cu"><span class="ce" id="cK">🐱</span><span class="cl">까미</span></div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="resultScreen">
  <div class="r-chars">🦋🐩🐱</div>
  <div class="r-title">릴레이 완료!</div>
  <div class="r-score" id="rs">0</div>
  <div class="r-unit">점</div>
  <div class="rank" id="rk"></div>
  <div class="r-msg" id="rm"></div>
  <button class="retry-btn" onclick="reset()">🔄 다시 하기</button>
</div>

<script>
const TYPES=[
  {e:'🌈',pt:3, spd:1.2,r:.12},
  {e:'☁️', pt:1, spd:2.0,r:.55},
  {e:'⛅', pt:1, spd:2.6,r:.20},
  {e:'🌧️',pt:-2,spd:1.7,r:.13},
];
// 누적 확률
const CUM=TYPES.reduce((a,t,i)=>{a.push((a[i-1]||0)+t.r);return a},[]);

let score=0,timeLeft=30,running=false;
let clouds=[],raf=null,ticker=null;
let W=0,H=0,BAR=80,HUD=60;
let spawnMs=1200,spawnAcc=0,lastTs=0;
let ctx;

const canvas=document.getElementById('c');

function randType(){
  const r=Math.random();
  return TYPES[CUM.findIndex(p=>r<=p)]||TYPES[1];
}

function resize(){
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=W;
  canvas.height=H;
}

function spawn(){
  const t=randType();
  const sz=44+Math.random()*12;
  clouds.push({
    x:sz+Math.random()*(W-sz*2),
    y:-sz,
    vy:t.spd*(0.85+Math.random()*.3),
    t,sz,
    hit:false,alpha:1
  });
}

function loop(ts){
  if(!running){return}
  const dt=Math.min(ts-lastTs,80);
  lastTs=ts;

  spawnAcc+=dt;
  if(spawnAcc>=spawnMs){
    spawn();
    spawnAcc=0;
    spawnMs=Math.max(550,spawnMs-10);
  }

  ctx.clearRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  for(let i=clouds.length-1;i>=0;i--){
    const c=clouds[i];
    if(!c.hit){
      c.y+=c.vy*(dt/16);
      // 비구름 놓쳤을 때 그냥 사라짐 (점수 차감 없음)
      if(c.y>H-BAR+c.sz){clouds.splice(i,1);continue}
    } else {
      c.alpha-=0.07;
      if(c.alpha<=0){clouds.splice(i,1);continue}
    }
    ctx.save();
    ctx.globalAlpha=c.alpha;
    ctx.font=`${c.sz*(c.hit?1+(.9-c.alpha)*.5:1)}px serif`;
    ctx.fillText(c.t.e,c.x,c.y);
    ctx.restore();
  }

  raf=requestAnimationFrame(loop);
}

function tap(px,py){
  if(!running)return;
  for(let i=clouds.length-1;i>=0;i--){
    const c=clouds[i];
    if(c.hit)continue;
    if(Math.abs(px-c.x)<c.sz*.9&&Math.abs(py-c.y)<c.sz*.9){
      c.hit=true;
      score=Math.max(0,score+c.t.pt);
      document.getElementById('sv').textContent=score;
      particle(px,py,c.t.pt);
      popChar(c.x);
      break;
    }
  }
}

function popChar(x){
  const ids=['cY','cB','cK'];
  const xs=[W*.18,W*.5,W*.82];
  let mi=0,md=9999;
  xs.forEach((bx,i)=>{const d=Math.abs(x-bx);if(d<md){md=d;mi=i}});
  const el=document.getElementById(ids[mi]);
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
}

function particle(x,y,pt){
  const d=document.createElement('div');
  d.className='pt';
  d.textContent=pt>0?`+${pt}⭐`:`${pt}💧`;
  d.style.cssText=`left:${x-18}px;top:${y-10}px;color:${pt>0?'#FFB800':'#6EC6F5'}`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),800);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  const gs=document.getElementById('gameScreen');
  gs.style.display='block';

  resize();
  ctx=canvas.getContext('2d');
  score=0;timeLeft=30;clouds=[];running=true;
  spawnMs=1200;spawnAcc=0;
  document.getElementById('sv').textContent='0';
  document.getElementById('tv').textContent='30';

  lastTs=performance.now();
  raf=requestAnimationFrame(loop);

  ticker=setInterval(()=>{
    timeLeft--;
    document.getElementById('tv').textContent=timeLeft;
    if(timeLeft<=0)endGame();
  },1000);

  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    tap(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top);
  },{passive:false});
  canvas.addEventListener('click',e=>{
    const r=canvas.getBoundingClientRect();
    tap(e.clientX-r.left,e.clientY-r.top);
  });
}

function endGame(){
  running=false;
  clearInterval(ticker);
  cancelAnimationFrame(raf);

  document.getElementById('gameScreen').style.display='none';
  const rs=document.getElementById('resultScreen');
  rs.style.display='flex';

  document.getElementById('rs').textContent=score;

  let cls,label,msg;
  if(score>=25){cls='rs';label='🏆 S랭크!';msg='열무·배추·까미 최강 팀워크!! 구름이 다 우리 거야!! 🌈🎉';}
  else if(score>=15){cls='ra';label='🥈 A랭크!';msg='훌륭해요! 열무 나비귀가 오늘따라 더 반짝였어요 ✨🦋';}
  else if(score>=8){cls='rb';label='🥉 B랭크!';msg='잘 했어요! 배추 처진귀가 구름을 소곤소곤 받아줬어요 🐩☁️';}
  else{cls='rc';label='😹 C랭크';msg='까미가 기역자 꼬리로 응원해요! 다시 도전해봐요 🐱💪';}

  const rk=document.getElementById('rk');
  rk.textContent=label;
  rk.className='rank '+cls;
  document.getElementById('rm').textContent=msg;
}

function reset(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
}

document.getElementById('startBtn').addEventListener('click',startGame);
window.addEventListener('resize',()=>{if(running)resize()});
</script>
</body>
</html>
